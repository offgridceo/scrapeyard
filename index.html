<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRAPEYARD</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-300 font-mono min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-black border border-red-600 p-6 shadow-[4px_4px_0px_#dc2626]">
        <h1 class="text-3xl font-black tracking-tighter text-red-600 mb-4">SCRAPEYARD</h1>
        <input type="text" id="url" placeholder="Paste link here..." class="w-full bg-zinc-900 border border-zinc-700 p-4 text-sm text-white focus:outline-none focus:border-red-600 mb-4">
        <div id="msg" class="hidden text-xs text-yellow-500 font-bold mb-4 uppercase animate-pulse"></div>
        <div id="buttons" class="hidden flex flex-col gap-2">
            <button onclick="dl('original')" class="border border-zinc-700 p-3 text-xs font-bold text-left hover:bg-red-600 hover:text-black">🎬 MAX QUALITY ORIGINAL</button>
            <button onclick="dl('1080p')" class="border border-zinc-700 p-3 text-xs font-bold text-left hover:bg-red-600 hover:text-black">📺 STABLE 1080P MP4</button>
            <button onclick="dl('mp3')" class="border border-zinc-700 p-3 text-xs font-bold text-left hover:bg-red-600 hover:text-black">🎵 EXTRACT AUDIO TRACK (.MP3)</button>
        </div>
    </div>
    <script>
        const url = document.getElementById('url'), msg = document.getElementById('msg'), btns = document.getElementById('buttons');
        url.addEventListener('input', async () => {
            if(!url.value.trim()) return; msg.innerText = "Analyzing target..."; msg.classList.remove('hidden');
            let res = await fetch('/api/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:url.value})});
            let data = await res.json();
            if(data.error) { msg.innerText = "Extraction error."; return; }
            msg.classList.add('hidden'); btns.classList.remove('hidden');
        });
        function dl(mode) { msg.innerText = "Processing stream download..."; msg.classList.remove('hidden'); window.location.href = `/api/download?url=${encodeURIComponent(url.value)}&mode=${mode}`; }
    </script>
</body>
</html>
