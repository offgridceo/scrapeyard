<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCRAPEYARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-300 font-mono min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-black border border-red-600 p-6 shadow-[4px_4px_0px_#dc2626]">
        <h1 class="text-3xl font-black tracking-tighter text-red-600 mb-4">SCRAPEYARD</h1>
        
        <input type="text" id="url" placeholder="Paste video link here..." class="w-full bg-zinc-900 border border-zinc-700 p-4 text-sm text-white focus:outline-none focus:border-red-600 mb-4">
        <div id="msg" class="hidden text-xs text-yellow-500 font-bold mb-4 uppercase animate-pulse"></div>
        
        <button onclick="dl()" class="w-full border border-zinc-700 p-4 text-xs font-bold uppercase tracking-wider text-center bg-zinc-900 hover:bg-red-600 hover:text-black transition">
            ⚡ Extract 1080p Video
        </button>
    </div>
    <script>
        function dl() {
            const urlVal = document.getElementById('url').value.trim();
            if(!urlVal) return;
            const msg = document.getElementById('msg');
            msg.innerText = "Extracting video stream... Download initializing.";
            msg.classList.remove('hidden');
            window.location.href = `/api/download?url=${encodeURIComponent(urlVal)}`;
        }
    </script>
</body>
</html>
